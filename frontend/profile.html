<!DOCTYPE html>
<html>
<head>
  <title>HELKET Profile</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

  <button onclick="goHome()">⬅ Back to Feed</button>

  <div id="profileHeader" class="card">
    <div class="user">
      <img id="profilePic" src="">
      <b id="profileName"></b>
    </div>
    <div>
      <span id="followers"></span> Followers | 
      <span id="following"></span> Following
    </div>
    <button id="followBtn" onclick="toggleFollow()">Follow</button>
  </div>

  <h3>User Posts</h3>
  <div id="profilePosts"></div>

</div>

<script src="app.js"></script>
</body>
</html>
