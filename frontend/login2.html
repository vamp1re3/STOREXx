
<!DOCTYPE html>
<html>
  <head>
  <title>HELKET Feed</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

  <h1>🔥 HELKET</h1>


  <!-- AUTH -->
  <div class="card" id="auth">
    
    <input id="username" placeholder="Username">
    <input id="email" placeholder="Email">
    <input id="password" placeholder="Password" type="password">
    <input id="confirmPassword" placeholder="Confirm Password" type="password">
    <input id="pic" placeholder="Profile Pic URL">
    <button onclick="signup()">Sign Up</button>
    <a href="LOGIN.html"><button>Login</button></a>
  </div>


    <!-- CREATE POST -->
  <div class="card hidden" id="postBox">
    <input id="img" placeholder="Image URL">
    <input id="cap" placeholder="Caption">
    <button onclick="post()">Post</button>
  </div>



</div>

<script src="app.js"></script>
</body>

  </html>
